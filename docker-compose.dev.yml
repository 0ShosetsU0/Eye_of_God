version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: defectvision
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/defectvision
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: minio:9000
      ML_SERVICE_URL: http://ml-service:8001
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  ml-service:
    build: ./ml-service
    environment:
      ML_USE_MOCK: "true"
      ML_DEV_MODE: "true"
    ports:
      - "8001:8001"
    volumes:
      - ./ml-service:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:80"