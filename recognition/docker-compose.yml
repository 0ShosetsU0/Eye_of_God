# docker-compose.yml
version: '3.8'

services:
  ml-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - ML_USE_MOCK=true
      - ML_DEV_MODE=true
      - ML_SERVICE_HOST=0.0.0.0
      - ML_SERVICE_PORT=8001
    volumes:
      - ./app:/app/app
      - ./models_storage:/app/models_storage
      - ./temp:/app/temp
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload